<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="hermesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="openclawGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1920" height="5" fill="url(#lineGrad)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="400" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.1"/>
  <circle cx="1720" cy="880" r="450" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
  <circle cx="960" cy="540" r="300" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>

  <!-- Grid lines (subtle) -->
  <line x1="480" y1="0" x2="480" y2="1080" stroke="#1e293b" stroke-width="1"/>
  <line x1="1440" y1="0" x2="1440" y2="1080" stroke="#1e293b" stroke-width="1"/>

  <!-- Left: Hermes -->
  <g>
    <rect x="80" y="340" width="380" height="400" rx="16" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
    <text x="270" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#hermesGrad)" text-anchor="middle" filter="url(#glow)">Hermes</text>
    <text x="270" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle" letter-spacing="6">智能体框架</text>
    <text x="270" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Skills · Memory · SubAgent</text>
  </g>

  <!-- Center: VS -->
  <g>
    <line x1="480" y1="540" x2="1440" y2="540" stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="12,8"/>
    <circle cx="960" cy="540" r="36" fill="#0f172a" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <text x="960" y="552" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">VS</text>
  </g>

  <!-- Right: OpenClaw -->
  <g>
    <rect x="1460" y="340" width="380" height="400" rx="16" fill="#1c1408" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <text x="1650" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#openclawGrad)" text-anchor="middle" filter="url(#glow)">OpenClaw</text>
    <text x="1650" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle" letter-spacing="6">智能体框架</text>
    <text x="1650" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Skills · Memory · SubAgent</text>
  </g>

  <!-- Title area (top) -->
  <text x="960" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" fill="#ffffff" text-anchor="middle" filter="url(#glow)">AI 智能体架构实战</text>
  <text x="960" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8" text-anchor="middle">双框架深度对比与选型指南</text>

  <!-- Bottom keywords -->
  <line x1="200" y1="820" x2="1720" y2="820" stroke="#334155" stroke-width="1"/>
  <text x="960" y="880" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">源码分析  |  架构对比  |  实战踩坑</text>

  <!-- Tags -->
  <rect x="600" y="920" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155"/>
  <text x="660" y="944" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Agent</text>
  <rect x="740" y="920" width="140" height="36" rx="18" fill="#1e293b" stroke="#334155"/>
  <text x="810" y="944" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">OpenClaw</text>
  <rect x="900" y="920" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155"/>
  <text x="960" y="944" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Hermes</text>
  <rect x="1040" y="920" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155"/>
  <text x="1100" y="944" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Skills</text>
  <rect x="1180" y="920" width="120" height="36" rx="18" fill="#1e293b" stroke="#334155"/>
  <text x="1240" y="944" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Memory</text>

  <!-- Bottom accent line -->
  <rect x="0" y="1075" width="1920" height="5" fill="url(#lineGrad)"/>
</svg>